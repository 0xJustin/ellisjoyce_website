<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Bird Map seen filter preview</title>
  <desc id="desc">Snapshot-style preview of the Bird Map with the Seen filter selected.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d5dfda"/>
      <stop offset="100%" stop-color="#c7d7d1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="11" flood-color="#122922" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="54" y="48" width="1492" height="804" rx="24" fill="#eef4f1" stroke="#8fa29a" stroke-opacity="0.42" stroke-width="2" filter="url(#shadow)"/>

